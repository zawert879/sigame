name: Build and Push Docker Image

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{github.event.repository.name}}
  PROJECT_NAME: sigame 
  SERVICE_NAME: admin
  KEEP: 10

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Send POST request
        run: |
          curl  --fail --show-error --silent  -X POST https://dcm.zawserv.ru/project/service \
            -H "x-blabla-auth: ${{ secrets.DCM_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"project": "${{ env.PROJECT_NAME }}", "service": "${{ env.SERVICE_NAME }}", "version": "${{ github.sha }}"}'
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Установка GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh jq

      - name: Аутентификация в GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Удаление старых образов, оставляя 10 последних
        run: |
          echo "Получение версий образа ${{github.event.repository.name}}"

          # Получение списка ID версий образа, отсортированных по дате (от новых к старым)
          VERSIONS=$(gh api -H "Accept: application/vnd.github+json" \
            /users/${{ github.actor }}/packages/container/${{github.event.repository.name}}/versions \
            | jq -r 'sort_by(.created_at) | reverse | .[].id')

          COUNT=0
          for ID in $VERSIONS; do
            COUNT=$((COUNT + 1))
            if [ "$COUNT" -le "${{ env.KEEP }}" ]; then
              echo "✅ Сохраняем версию $ID"
            else
              echo "🗑 Удаляем версию $ID"
              gh api -X DELETE \
                -H "Accept: application/vnd.github+json" \
                /users/${{ github.actor }}/packages/container/${{github.event.repository.name}}/versions/$ID
            fi
          done